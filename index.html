<!DOCTYPE html>
<html>
<head>
    <title>O-Level DC Motor Simulator</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; display: flex; flex-direction: column; align-items: center; background: #eceff1; color: #263238; }
        .container { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); margin-top: 20px; text-align: center; }
        canvas { background: #fafafa; border: 1px solid #cfd8dc; border-radius: 8px; margin: 20px 0; }
        .controls { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; text-align: left; background: #f1f8e9; padding: 15px; border-radius: 8px; }
        label { font-weight: bold; font-size: 0.9em; }
        input { width: 100%; }
        .stats { font-family: monospace; background: #263238; color: #81c784; padding: 10px; border-radius: 5px; margin-bottom: 10px; }
    </style>
</head>
<body>

    <div class="container">
        <h2>DC Motor Interactive (O-Level 6091)</h2>
        <p>Observe how <i>B</i>, <i>I</i>, and <i>N</i> affect the turning effect.</p>
        
        <div class="stats">
            Rotation Speed: <span id="speedDisplay">0</span> rad/s
        </div>

        <canvas id="motorCanvas" width="600" height="300"></canvas>

        <div class="controls">
            <label>Current (I): <input type="range" id="current" min="0" max="5" step="0.5" value="2"></label>
            <label>Magnetic Strength (B): <input type="range" id="magField" min="0.1" max="2" step="0.1" value="1"></label>
            <label>Number of Coils (N): <input type="range" id="coils" min="1" max="50" value="10"></label>
            <button id="resetBtn" style="grid-column: span 2; padding: 10px; cursor: pointer; background: #2e7d32; color: white; border: none; border-radius: 4px;">Reset Motor</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('motorCanvas');
        const ctx = canvas.getContext('2d');
        
        let angle = 0;
        let angularVelocity = 0;

        function draw() {
            const I = parseFloat(document.getElementById('current').value);
            const B = parseFloat(document.getElementById('magField').value);
            const N = parseInt(document.getElementById('coils').value);

            // Physics Logic: Speed is proportional to B * I * N
            // In a real motor, back EMF would limit speed, but here we show direct proportionality
            angularVelocity = B * I * (N / 10) * 0.1;
            document.getElementById('speedDisplay').innerText = (angularVelocity * 60).toFixed(1);

            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // 1. Draw Magnets
            ctx.fillStyle = "#ef5350"; // North
            ctx.fillRect(50, 100, 80, 100);
            ctx.fillStyle = "#42a5f5"; // South
            ctx.fillRect(470, 100, 80, 100);
            ctx.fillStyle = "black";
            ctx.fillText("N", 85, 155);
            ctx.fillText("S", 505, 155);

            // 2. Draw Magnetic Field Lines (Visual cue)
            ctx.strokeStyle = "rgba(0,0,0,0.1)";
            for(let i = 110; i < 200; i+=20) {
                ctx.beginPath();
                ctx.moveTo(130, i);
                ctx.lineTo(470, i);
                ctx.stroke();
            }

            // 3. Draw Rotating Coil (Perspective Projection)
            const centerX = 300;
            const centerY = 150;
            const coilWidth = 150;
            const coilHeight = 80;

            const xOffset = Math.cos(angle) * coilWidth / 2;
            const zOffset = Math.sin(angle) * 30; // Simulates depth

            ctx.strokeStyle = "#fb8c00";
            ctx.lineWidth = 2 + (N/10); // Thicker line for more coils
            
            ctx.beginPath();
            // Side A
            ctx.moveTo(centerX - xOffset, centerY - 40 + zOffset);
            ctx.lineTo(centerX - xOffset, centerY + 40 + zOffset);
            // Front
            ctx.lineTo(centerX + xOffset, centerY + 40 - zOffset);
            // Side B
            ctx.lineTo(centerX + xOffset, centerY - 40 - zOffset);
            ctx.closePath();
            ctx.stroke();

            // 4. Draw split-ring commutator (Simplified)
            ctx.strokeStyle = "gray";
            ctx.lineWidth = 4;
            ctx.beginPath();
            ctx.arc(centerX, centerY + 80, 15, 0, Math.PI, angle > Math.PI);
            ctx.stroke();

            angle += angularVelocity;
            if (angle > Math.PI * 2) angle = 0;

            requestAnimationFrame(draw);
        }

        document.getElementById('resetBtn').onclick = () => {
            document.getElementById('current').value = 2;
            document.getElementById('magField').value = 1;
            document.getElementById('coils').value = 10;
        };

        draw();
    </script>
</body>
</html>
