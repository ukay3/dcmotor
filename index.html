<!DOCTYPE html>
<html>
<head>
    <title>O-Level Physics: DC Motor Setup</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; display: flex; flex-direction: column; align-items: center; background: #f4f7f6; }
        .app-container { background: white; padding: 25px; border-radius: 15px; box-shadow: 0 12px 30px rgba(0,0,0,0.15); margin-top: 30px; width: 700px; text-align: center; }
        canvas { background: #ffffff; border: 1px solid #d1d9e6; border-radius: 10px; cursor: crosshair; }
        .ui-panel { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; padding: 20px; background: #e8f5e9; border-radius: 10px; text-align: left; }
        .readout { font-size: 1.2rem; font-weight: bold; color: #2e7d32; margin-bottom: 10px; }
        .label-group { display: flex; flex-direction: column; }
        input[type=range] { width: 100%; cursor: pointer; }
    </style>
</head>
<body>

<div class="app-container">
    <h2>DC Motor: Complete Set-up</h2>
    <div class="readout">Current Speed: <span id="speedVal">0</span> RPM</div>
    
    <canvas id="motorCanvas" width="650" height="350"></canvas>

    <div class="ui-panel">
        <div class="label-group">
            <label>Current (I): <b id="iDisp">2.0 A</b></label>
            <input type="range" id="current" min="-5" max="5" step="0.5" value="2">
        </div>
        <div class="label-group">
            <label>Magnetic Field (B): <b id="bDisp">1.0 T</b></label>
            <input type="range" id="magField" min="0.1" max="2" step="0.1" value="1">
        </div>
        <div class="label-group" style="grid-column: span 2;">
            <label>Number of Turns (N): <b id="nDisp">5</b></label>
            <input type="range" id="coils" min="1" max="15" step="1" value="5">
        </div>
